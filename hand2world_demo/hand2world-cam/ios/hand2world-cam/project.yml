name: hand2world-cam
options:
  bundleIdPrefix: com.hand2world
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEVELOPMENT_LANGUAGE: en

targets:
  hand2world-cam:
    type: application
    platform: iOS
    sources:
      - hand2world-cam
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hand2world.cam
        PRODUCT_NAME: hand2world-cam
        MARKETING_VERSION: "0.1.0"
        CURRENT_PROJECT_VERSION: "1"
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: hand2world-cam/Info.plist
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies: []
